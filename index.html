<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'">
<title>✦ 星詠みの館 ✦</title>
<style>
  :root {
    --ts: 0.6s;
    --site-w: 720px;
    --fortune-ink: #2d073f;
    --fortune-panel: #fff5c8;
    --fortune-pink: #ff7ad9;
    --fortune-cyan: #58f0ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:'MS PGothic','Hiragino Kaku Gothic ProN',sans-serif;
    overflow:hidden;
    transition:background var(--ts);
  }
  #header, #chat, #input-area { width:min(100%, var(--site-w)); }

  /* === FORTUNE === */
  body.fortune-mode {
    color:var(--fortune-ink);
    background-color:#16001d;
    background-image:
      radial-gradient(circle at 12px 10px, #fff7a8 0 1px, transparent 2px),
      radial-gradient(circle at 45px 38px, #ff7ad9 0 1px, transparent 2px),
      radial-gradient(circle at 70px 18px, #58f0ff 0 1px, transparent 2px),
      repeating-linear-gradient(45deg, #2b0040 0 7px, #1b0029 7px 14px);
    background-size:82px 64px, 96px 78px, 120px 88px, 28px 28px;
  }
  body.fortune-mode::before {
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(90deg, #ffffff0a 1px, transparent 1px),
      linear-gradient(#ffffff08 1px, transparent 1px);
    background-size:12px 12px;
    mix-blend-mode:screen;
    opacity:.75;
  }
  body.fortune-mode #header {
    position:relative;
    z-index:1;
    text-align:center;
    padding:12px 10px 8px;
    background:
      linear-gradient(180deg,#fff9da 0%,#ffd7f6 52%,#fff3a8 100%);
    border:4px double #7f1499;
    border-top:0;
    box-shadow:0 0 0 2px #fff, 0 6px 24px #0008;
  }
  body.fortune-mode #header::before,
  body.fortune-mode #header::after {
    content:"★彡";
    position:absolute;
    top:12px;
    color:#d018a8;
    font-size:18px;
    text-shadow:1px 1px 0 #fff, 0 0 8px #fffa7d;
  }
  body.fortune-mode #header::before { left:12px; }
  body.fortune-mode #header::after { right:12px; transform:scaleX(-1); }
  body.fortune-mode #header h1 {
    display:inline-block;
    font-family:'Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:23px;
    font-weight:700;
    letter-spacing:3px;
    color:#6d007e;
    background:linear-gradient(90deg,#6d007e,#e30097 42%,#744000 70%,#6d007e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 0 #6d007e, 1px 1px 0 #fff36e, 0 0 10px #ff7ad9;
  }
  body.fortune-mode #header p {
    display:inline-block;
    font-size:12px;
    color:#5c166d;
    margin-top:5px;
    padding:2px 8px;
    background:#ffffff99;
    border:1px dashed #d018a8;
  }
  .counter-strip {
    margin:7px auto 0;
    padding:4px 8px;
    width:min(100%, 420px);
    color:#111;
    background:#fff;
    border:2px inset #e8c600;
    font-size:12px;
    line-height:1.35;
    box-shadow:inset 0 0 8px #ffe66a;
  }
  .counter-strip b {
    color:#d60000;
    font-family:'Courier New',monospace;
    font-size:15px;
    letter-spacing:1px;
  }
  .tiny-notice {
    margin-top:5px;
    color:#0b3c73;
    font-size:11px;
    line-height:1.25;
  }
  .tiny-notice span {
    color:#e60073;
    font-weight:bold;
    animation:blinkText 1.1s steps(2,end) infinite;
  }
  @keyframes blinkText { 50%{opacity:.25} }

  /* === TERMINAL === */
  body.terminal-mode { background:#0a0a0a; color:#00ff88; font-family:'Courier New',monospace; }
  body.terminal-mode #header { text-align:center; padding:14px 12px 10px; border-bottom:1px solid #00ff8833; background:#0d0d0d; }
  body.terminal-mode #header h1 { font-size:16px; color:#00ff88; letter-spacing:3px; font-family:'Courier New',monospace; background:none; -webkit-text-fill-color:#00ff88; }
  body.terminal-mode #header p { font-size:11px; color:#00ff8888; margin-top:4px; font-family:'Courier New',monospace; }
  body.terminal-mode .counter-strip,
  body.terminal-mode .tiny-notice { display:none; }

  /* === CHAT === */
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
  .msg { max-width:82%; padding:10px 14px; border-radius:12px; line-height:1.7; font-size:14.5px; white-space:pre-wrap; animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  body.fortune-mode #chat {
    position:relative;
    z-index:1;
    margin-top:8px;
    background:#fff8dcdd;
    border-left:4px double #7f1499;
    border-right:4px double #7f1499;
    box-shadow:0 0 0 2px #fff, 0 0 22px #0008;
  }
  body.fortune-mode .bot {
    align-self:flex-start;
    background:#fffdf2;
    border:2px ridge #d018a8;
    color:#351047;
    border-radius:2px 14px 14px 14px;
    box-shadow:3px 3px 0 #ffd84d, 0 0 10px #ff7ad955;
  }
  body.fortune-mode .bot::first-line { color:#9b006e; font-weight:bold; }
  body.fortune-mode .user {
    align-self:flex-end;
    background:#1f0030;
    border:2px outset #58f0ff;
    color:#fff66b;
    border-radius:14px 2px 14px 14px;
    box-shadow:-3px 3px 0 #ff7ad9;
  }
  body.terminal-mode .bot { align-self:flex-start; background:#111a14; border:1px solid #00ff8833; color:#00ff88; border-radius:6px; font-family:'Courier New',monospace; }
  body.terminal-mode .user { align-self:flex-end; background:#0a1f10; border:1px solid #00ff8822; color:#88ffcc; border-radius:6px; font-family:'Courier New',monospace; }

  /* Key fragment badge */
  .key-fragment { display:inline-block; padding:4px 12px; margin:4px 0; background:#4a1d8e; border:1px solid #9b6fdb; border-radius:4px; color:#ffd700; font-weight:bold; font-size:16px; letter-spacing:2px; font-family:'Courier New',monospace; }
  body.fortune-mode .key-fragment {
    background:#120020;
    border:2px groove #fff66b;
    color:#58f0ff;
    text-shadow:0 0 6px #58f0ff;
    box-shadow:0 0 0 2px #d018a8;
  }

  /* Terminal accents */
  .cmd-hl { color:#ff8844; font-weight:bold; }
  .sin-count { color:#888; font-size:12px; margin-left:6px; }

  /* Typing indicator */
  .typing-dots::after { content:''; animation:dots 1.2s steps(4) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  /* Location reveal */
  .loc-reveal { font-size:17px; text-align:center; padding:16px; margin:8px 0; border:2px solid; border-radius:8px; animation:glow 1.5s ease-in-out infinite alternate; }
body.terminal-mode .loc-reveal { border-color:#ffdd00; color:#ffdd00; }
body.terminal-mode input:disabled,
body.terminal-mode button:disabled { opacity:.55; cursor:not-allowed; }
@keyframes glow { from{box-shadow:0 0 5px #ffdd0033} to{box-shadow:0 0 25px #ffdd0088} }

  /* Glitch */
  .glitch-overlay { position:fixed; inset:0; background:#0a0a0a; z-index:9999; display:none; justify-content:center; align-items:center; font-family:'Courier New',monospace; color:#00ff88; font-size:14px; }
  .glitch-overlay.active { display:flex; }
  .glitch-text { text-align:center; line-height:2; animation:flicker .1s infinite; }
  @keyframes flicker { 0%{opacity:1} 50%{opacity:.7} 100%{opacity:1} }

  /* Input */
  #input-area { display:flex; padding:10px 14px; gap:8px; transition:background var(--ts),border var(--ts); }
  body.fortune-mode #input-area {
    position:relative;
    z-index:1;
    background:#ffe7fb;
    border:4px double #7f1499;
    border-bottom:0;
    box-shadow:0 0 0 2px #fff, 0 -4px 20px #0008;
  }
  body.terminal-mode #input-area { background:#0d0d0d; border-top:1px solid #00ff8833; }
  #input-area input { flex:1; padding:10px 14px; font-size:15px; border-radius:8px; outline:none; transition:all var(--ts); }
  body.fortune-mode #input-area input {
    background:#fff;
    border:2px inset #c000a0;
    color:#260033;
    font-family:'MS PGothic','Hiragino Kaku Gothic ProN',sans-serif;
    border-radius:2px;
    box-shadow:inset 0 0 6px #ffd84d;
  }
  body.terminal-mode #input-area input { background:#0a0a0a; border:1px solid #00ff8855; color:#00ff88; font-family:'Courier New',monospace; border-radius:4px; }
  #input-area button { padding:10px 18px; font-size:15px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; transition:all var(--ts); }
  body.fortune-mode #input-area button {
    background:linear-gradient(180deg,#fff66b 0%,#ff9a00 48%,#e64500 100%);
    color:#420026;
    border:2px outset #ffd84d;
    border-radius:2px;
    font-family:'MS PGothic','Hiragino Kaku Gothic ProN',sans-serif;
    text-shadow:1px 1px 0 #fff;
    box-shadow:0 0 8px #ff7ad9;
  }
  body.terminal-mode #input-area button { background:#00ff88; color:#0a0a0a; font-family:'Courier New',monospace; border-radius:4px; }

  /* Fortune corruption stages */
  body.fortune-mode[class*="corrupt-"] {
    animation:bgDrift 8s steps(3,end) infinite;
  }
  body.fortune-mode.corrupt-1 #header h1 {
    text-shadow:2px 0 0 #58f0ff, -1px 0 0 #ff7ad9, 0 0 10px #fff36e;
  }
  body.fortune-mode.corrupt-1 .counter-strip {
    filter:hue-rotate(15deg);
  }
  body.fortune-mode.corrupt-2 #header,
  body.fortune-mode.corrupt-2 #chat {
    filter:saturate(1.15) hue-rotate(6deg);
  }
  body.fortune-mode.corrupt-2 .msg:not(.user):not(.protected-msg) {
    text-shadow:1px 0 0 #58f0ff, -1px 0 0 #ff7ad9;
  }
  body.fortune-mode.corrupt-3::after,
  body.fortune-mode.corrupt-4::after,
  body.fortune-mode.corrupt-5::after {
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:2;
    background:
      linear-gradient(90deg, transparent, #58f0ff18, transparent 42%, #ff7ad918, transparent);
    mix-blend-mode:multiply;
  }
  body.fortune-mode.corrupt-3 #header {
    filter:contrast(1.12) hue-rotate(-10deg);
  }
  body.fortune-mode.corrupt-3 .counter-strip {
    letter-spacing:1px;
    box-shadow:inset 0 0 8px #ffe66a, 0 0 12px #58f0ff;
  }
  body.fortune-mode.corrupt-3 .msg:not(.user):not(.typing-dots):not(.protected-msg) {
    filter:contrast(1.15) saturate(1.2);
  }
  body.fortune-mode.corrupt-4 {
    animation:bgDrift 5.5s steps(2,end) infinite;
  }
  body.fortune-mode.corrupt-4 #header,
  body.fortune-mode.corrupt-4 #chat {
    box-shadow:4px 0 0 #58f0ff, -4px 0 0 #ff7ad9, 0 0 22px #000a;
  }
  body.fortune-mode.corrupt-4 #header h1,
  body.fortune-mode.corrupt-4 .msg:not(.user):not(.typing-dots):not(.protected-msg) {
    animation:textGlitch .8s steps(2,end) infinite;
  }
  body.fortune-mode.corrupt-5 {
    background-blend-mode:screen,screen,screen,normal;
    animation:bgDrift 4s steps(2,end) infinite;
  }
  body.fortune-mode.corrupt-5 #header {
    background:linear-gradient(180deg,#fff 0%,#b7fff9 46%,#ffb3ec 47%,#ffe66a 100%);
  }
  body.fortune-mode.corrupt-5 #header h1 {
    color:#2bff9f;
    -webkit-text-fill-color:#2bff9f;
    background:none;
    text-shadow:3px 0 0 #ff004d, -3px 0 0 #00e5ff, 0 0 12px #000;
  }
  body.fortune-mode.corrupt-5 .counter-strip {
    color:#fff;
    background:#17001f;
    border-color:#58f0ff;
    box-shadow:inset 0 0 8px #ff7ad9, 0 0 16px #58f0ff;
  }
  body.fortune-mode.corrupt-5 .counter-strip b {
    color:#2bff9f;
    text-shadow:0 0 8px #2bff9f;
  }
  body.fortune-mode.corrupt-5 .msg:not(.user):not(.typing-dots):not(.protected-msg) {
    background:#fff;
    color:#17001f;
    border-color:#2bff9f;
  }
  body.fortune-mode.corrupt-4 #input-area,
  body.fortune-mode.corrupt-5 #input-area {
    z-index:3;
    transform:none;
  }
  body.fortune-mode[class*="corrupt-"] .key-fragment {
    filter:none;
    animation:none;
    text-shadow:0 0 6px #58f0ff;
  }
  body.fortune-mode[class*="corrupt-"] .protected-msg {
    filter:none;
    animation:none;
    text-shadow:none;
  }
  @keyframes bgDrift {
    0%{background-position:0 0,0 0,0 0,0 0}
    50%{background-position:8px -4px,-5px 6px,4px 9px,14px 0}
    100%{background-position:0 0,0 0,0 0,0 0}
  }
  @keyframes textGlitch {
    0%,100%{text-shadow:2px 0 0 #58f0ff, -2px 0 0 #ff7ad9}
    50%{text-shadow:-2px 0 0 #58f0ff, 2px 0 0 #ff7ad9}
  }

  @media (max-width:480px) {
    body.fortune-mode #header { padding:10px 8px 7px; }
    body.fortune-mode #header::before,
    body.fortune-mode #header::after { display:none; }
    body.fortune-mode #header h1 { font-size:20px; letter-spacing:2px; }
    .counter-strip { font-size:11px; padding:3px 6px; }
    .tiny-notice { font-size:10.5px; }
    #chat { padding:12px 10px; gap:9px; }
    .msg { max-width:90%; font-size:14px; padding:9px 11px; }
    #input-area { padding:9px 10px; }
    #input-area button { padding:10px 13px; }
  }
</style>
</head>
<body class="fortune-mode">

<div id="header">
  <h1 id="fortuneTitle">✦ 星詠みの館 ✦</h1>
  <p id="fortuneSubtitle">あなたの運命を紐解きます</p>
  <div class="counter-strip">あなたは <b id="visitorCounter">003103</b> 番目のお客様です。キリバン報告は星に願ってください。</div>
  <div class="tiny-notice"><span id="noticeBadge">無料鑑定中</span> / <span id="noticeLine">名前・悩み・直感で浮かんだ言葉を入力できます</span></div>
</div>
<div id="chat"></div>
<div id="input-area">
  <input type="text" id="userInput" placeholder="なんでも聞いてみて..." autocomplete="off">
  <button onclick="send()">占う</button>
</div>
<div class="glitch-overlay" id="glitch">
  <div class="glitch-text" id="glitch-text"></div>
</div>

const LOOKUP_PREFIX = "hoshiyomi-arg-v2|lookup|";

const enc = new TextEncoder();

function getCryptoSubtle() {

async function sha256(t) {
  const subtle = getCryptoSubtle();
  if (!subtle) throw new Error("WebCrypto unavailable");
  const buf = await subtle.digest("SHA-256", enc.encode(t));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");

  const subtle = getCryptoSubtle();

  return subtle.importKey("raw", raw, "AES-GCM", false, ["decrypt"]);
}

  const bin = atob(s);

  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

  try {
    const key = await deriveDecryptKey(normed, purpose);
    const subtle = getCryptoSubtle();
    if (!subtle) return null;
    const plain = await subtle.decrypt({ name:"AES-GCM", iv:b64ToBytes(record.i) }, key, b64ToBytes(record.c));
    return dec.decode(plain);
  } catch (_) {
    return null;
  }
}

  const raw = await decryptRecord(record, normed, purpose);
  if (!raw) return null;

}

  let selected = pool[Math.floor(Math.random() * pool.length)];

function injectMojibake(text, amount) {
  if (amount <= 0) return text;
  const chars = Array.from(text);
  const step = Math.max(7, Math.floor(chars.length / (amount + 1)));
  let inserted = 0;
  for (let i = step; i < chars.length && inserted < amount; i += step) {
    if (chars[i] && chars[i] !== "\n" && chars[i] !== " ") {
      chars[i] += MOJIBAKE_MARKS[(i + inserted) % MOJIBAKE_MARKS.length];
      inserted++;
    }
  }
  return chars.join("");

function restoreState() {
  const raw = safeStorage(storage => storage.getItem(STORAGE_KEY));

  try {
    const state = JSON.parse(raw);
    answeredSins = new Set(Array.isArray(state.answeredSins) ? state.answeredSins : []);
    termFails = Number.isFinite(state.termFails) ? state.termFails : 0;

    fortuneInputCount = Number.isFinite(state.fortuneInputCount) ? state.fortuneInputCount : 0;
    corruptionLevel = Number.isFinite(state.corruptionLevel) ? state.corruptionLevel : 0;
    chat.innerHTML = typeof state.chatHtml === "string" ? state.chatHtml : "";
    applyModeShell(state.mode === "terminal" ? "terminal" : "fortune");

function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

// ===== Init =====
async function init() {
  if (!canUseCrypto()) {
    stopForCryptoUnavailable();
    return;
  }
  for (const rec of OBF.n) nameMap.set(rec.h, rec);
  for (const rec of OBF.s) sinMap.set(rec.h, rec);
  if (restoreState()) return;
  await delay(600);
  addBot(GREETING);
}

// ===== Glitch Transition =====
async function glitch() {
  const ov = document.getElementById("glitch");
  const gt = document.getElementById("glitch-text");
  ov.classList.add("active");
  const lines = ["ERROR: ANOMALY DETECTED","星座データベースに不正アクセス...","認証プロトコル書き換え中...","SYSTEM OVERRIDE \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588","新しい接続を確立しています...","TERMINAL ACCESS GRANTED"];
  for (let i = 0; i < lines.length; i++) { gt.textContent = lines.slice(0,i+1).join("\n"); await delay(500+Math.random()*400); }
  await delay(800);
  applyModeShell("terminal");
  chat.innerHTML = "";
  saveState();
  await delay(400);
  ov.classList.remove("active");
  await delay(300);
  addBot("接続確立。\n\nこのターミナルは認証プロトコルにより保護されています。\n認証キーワードを入力してください。");
}

// ===== Fortune Handler =====
async function handleFortune(val) {
  const trimmed = normText(val);
  const nameNorm = normName(trimmed);
  const nameRec = nameMap.get(await lookupHash(nameNorm, "name"));
  if (nameRec) {
    showTyping(); await delay(1000+Math.random()*500); removeTyping();
    const resp = await decryptRecord(nameRec, nameNorm, "name");
    addBot(resp || "星図照合に失敗しました。もう一度、名前を入力してください。");
    return;
  }
  const trigNorm = normKey(trimmed);
  if ((await lookupHash(trigNorm, "trigger")) === OBF.t.h) {
    showTyping(); await delay(1500); removeTyping();
    const lines = await decryptJson(OBF.t, trigNorm, "trigger");
    if (!Array.isArray(lines) || lines.length < 2) {
      addBot("星図の復号に失敗しました。もう一度入力してください。");
      return;
    }
    addBot(lines[0]);
    await delay(2000);
    addBot(lines[1]);
    await delay(2500);
    await glitch();
    return;
  }
  showTyping(); await delay(1200+Math.random()*1000); removeTyping();
  addBot(corruptFortuneText(pickFortune(trimmed)));
}

// ===== Terminal Handler =====
async function handleTerminal(val) {
  if (done) return;
  const trimmed = normText(val);
  showTyping(); await delay(400+Math.random()*300); removeTyping();

  // Final keyword check
  const finalNorm = normKey(trimmed);
  if ((await lookupHash(finalNorm, "final")) === OBF.f.h) {
    const payload = await decryptJson(OBF.f, finalNorm, "final");
    if (!payload || !payload.location || !payload.message) {
      addBot("最終認証データの復号に失敗しました。もう一度入力してください。");
      return;
    }
    addBot("最終認証コード受領。\n\nオペレーター権限を承認。\n座標データを復号しています...");
    await delay(1500);
    addBot("<div class=\"loc-reveal\">\u{1F4CD} " + escHtml(payload.location) + "</div>\n" + escHtml(payload.message));
    done = true;
    inp.placeholder = "RESETで初期化できます";
    saveState();
    return;
  }

  // Sin check
  const sinNorm = normText(trimmed);
  const sH = await lookupHash(sinNorm, "sin");
  const sinRec = sinMap.get(sH);
  if (sinRec) {
    if (answeredSins.has(sH)) { addBot("この認証断片は既に処理済みです。"); return; }
    const payload = await decryptJson(sinRec, sinNorm, "sin");
    if (!payload || !payload.coords) {
      addBot("認証断片の復号に失敗しました。もう一度入力してください。");
      return;
    }
    answeredSins.add(sH);
    const count = answeredSins.size;
    const c = payload.coords;
    addBot("認証断片を確認。<span class=\"sin-count\">[" + count + "/" + SIN_TOTAL + "]</span>\n\n<span class=\"cmd-hl\">削除対象: " + escHtml(c) + "</span>\n\n手元の記録から該当セルの文字を抹消せよ。");
    if (count === SIN_TOTAL) {
      await delay(1200);
      addBot("全認証断片の処理が完了した。\n\n記録に残された文字列を解読し、このターミナルに入力せよ。");
    }
    return;
  }

  // Wrong
  termFails++;
  let r = "不明なコマンド。認証キーワードを入力してください。";
  if (termFails >= 3) {
    r += answeredSins.size < SIN_TOTAL
      ? "\n\n<span style=\"color:#ffaa00;font-size:13px\">HINT: 手元の資料を確認せよ。血族の罪を知っているか？</span>"
      : "\n\n<span style=\"color:#ffaa00;font-size:13px\">HINT: グリッドに残された文字を、左上から順に読め。</span>";
    termFails = 0;
  }
  addBot(r);
}

// ===== Send =====
async function send() {
  const v = inp.value.trim();
  if (!v) return;
  if (normKey(v) === "RESET") { resetAll(); return; }
  if (done || busy) return;
  inp.value = "";
  busy = true;
  inp.disabled = true;
  sendBtn.disabled = true;
  addUser(v);
  try {
    if (mode === "fortune") advanceFortuneCorruption();
    if (mode === "fortune") await handleFortune(v);
    else await handleTerminal(v);
  } catch (_) {
    removeTyping();
    addBot("処理中にエラーが発生しました。ページをHTTPS環境で開き直すか、RESETで初期化してください。");
  } finally {
    busy = false;
    inp.disabled = false;
    sendBtn.disabled = false;
    inp.focus();
  }
}

inp.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
init();
</script>
